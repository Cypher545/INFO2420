<!DOCTYPE html>
<html>


<head lang="en">

<meta charset="UTF-8">
	
<title>HTML Practice 6 - Tables</title>

<style type="text/css">
.centeralign{ text-align: center;
            }
.tableformat{ margin: auto;
            width: 550px;
            height: 35px;
            }
table{ border: 1px solid black;
      padding: 5px;
      }
td, th { 
    border: 1px solid black;
    }
</style>
</head>
<body>
<div class="centeralign">
   <table class="tableformat">
      <caption>My Class Schedule</caption>
      <tr>
         <th>Courses</th>
         <th>Monday</th>
         <th>Tuesday</th>
         <th>Wednesday</th>
         <th>Thursday</th>
         <th>Friday</th>
      </tr>
      


   </table>
</div>



</body>
</html>
